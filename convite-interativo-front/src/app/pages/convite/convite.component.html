<div class="bg flex items-center justify-center p-4">
  <div class="max-w-6xl w-full">
    <div class="grid md:grid-cols-2 gap-8 items-start">

      <!-- COLUNA ESQUERDA: Imagem do convite -->
      <div class="order-1">
        <div class="transform hover:scale-105 transition-transform duration-300">
          <div class="relative">
            <img src="assets/fundo.png" alt="Convite de aniversário" class="w-full rounded-3xl shadow-2xl" />
            <button (click)="abrirModal()" class="absolute cursor-pointer"
              style="top: 60.6%; left: 61.7%; width: 9.7%; height: 6.9%; transform: translate(-50%, -50%); background: none; border: none;"
              title="Sugestões de presentes"></button>
          </div>
        </div>
      </div>

      <!-- COLUNA DIREITA: Formulário -->
      <div class="order-2">
        <div class="bg-white rounded-3xl shadow-2xl p-6 w-full"
          style="min-height: 231px; display: flex; flex-direction: column; justify-content: space-between; max-width: 410px;">

          <!-- Cabeçalho -->
          <div class="text-center">
            <h2 class="text-2xl font-bold mb-1" style="color: #f1a8a8;">Confirme sua Presença</h2>
            <p class="text-gray-600 text-sm">Vai ser uma festa inesquecível!</p>
          </div>

          <!-- Formulário -->
          <div class="space-y-3">

            <!-- Campo nome principal -->
            <div>
              <label class="block text-gray-700 font-semibold mb-1 text-left text-sm">Seu nome:</label>
              <input type="text" [(ngModel)]="nomeConvidado" placeholder="Digite seu nome completo"
                class="w-full px-3 py-2 rounded-xl border-2 focus:outline-none text-base transition-colors"
                style="border-color: #f7e2dd;" (focus)="$event.target.style.borderColor='#f1a8a8'"
                (blur)="$event.target.style.borderColor='#f7e2dd'" (keyup.enter)="confirmarPresenca()" />
            </div>

            <!-- ===== SEÇÃO ACOMPANHANTES ===== -->
            <div class="flex items-center justify-between px-1 py-2 rounded-xl cursor-pointer select-none"
              (click)="toggleAdultos()">
              <div class="flex items-center gap-3">
                <div
                  class="w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all duration-200 flex-shrink-0"
                  [style.border-color]="vaiComAdultos ? '#f1a8a8' : '#f7e2dd'"
                  [style.background]="vaiComAdultos ? 'linear-gradient(to right, #f7e2dd, #f1a8a8)' : 'white'">
                  <svg *ngIf="vaiComAdultos" xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white"
                    viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                      d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z"
                      clip-rule="evenodd" />
                  </svg>
                </div>
                <span class="text-gray-700 font-semibold text-sm">Vou com acompanhante(s)</span>
              </div>
              <div *ngIf="vaiComAdultos" class="flex items-center gap-2" (click)="$event.stopPropagation()">
                <button type="button" (click)="removerAdulto()"
                  class="w-7 h-7 rounded-full text-white font-bold text-lg flex items-center justify-center"
                  style="background: linear-gradient(to right, #f7e2dd, #f1a8a8);">−</button>
                <span class="text-gray-700 font-bold w-4 text-center text-sm">{{ nomesAdultos.length }}</span>
                <button type="button" (click)="adicionarAdulto()"
                  class="w-7 h-7 rounded-full text-white font-bold text-lg flex items-center justify-center"
                  style="background: linear-gradient(to right, #f7e2dd, #f1a8a8);">+</button>
              </div>
            </div>

            <div class="overflow-hidden transition-all duration-500 space-y-3"
              [style.max-height]="vaiComAdultos ? '400px' : '0px'" [style.opacity]="vaiComAdultos ? '1' : '0'">
              <div *ngFor="let nome of nomesAdultos; let i = index; trackBy: trackByIndex" class="space-y-1">
                <label class="block text-gray-700 font-semibold text-left text-sm">Acompanhante {{ i + 1 }}:</label>
                <input type="text" [(ngModel)]="nomesAdultos[i]" [name]="'adulto' + i"
                  placeholder="Digite o nome do acompanhante"
                  class="w-full px-3 py-2 rounded-xl border-2 focus:outline-none text-base transition-colors"
                  style="border-color: #f7e2dd;" (focus)="$event.target.style.borderColor='#f1a8a8'"
                  (blur)="$event.target.style.borderColor='#f7e2dd'" />
              </div>
            </div>


            <!-- Botão confirmar -->
            <button (click)="confirmarPresenca()" [disabled]="carregando"
              class="w-full text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-200 text-base cursor-pointer"
              style="background: linear-gradient(to right, #f7e2dd, #f1a8a8);">
              <span *ngIf="!carregando">Confirmar</span>
              <span *ngIf="carregando"> Carregando...</span>
            </button>
          </div>

          <div *ngIf="showMensagem" class="border-2 rounded-xl p-2 text-center mt-4"
            [class]="erroMensagem ? 'bg-red-100 border-red-500' : 'bg-green-100 border-green-500'">
            <p class="font-bold text-sm" [class]="erroMensagem ? 'text-red-700' : 'text-green-700'">
              {{ mensagem }}
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div *ngIf="modalAberta" class="fixed inset-0 flex items-center justify-center z-50" (click)="fecharModal()">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
  <div class="relative bg-white rounded-3xl shadow-2xl p-6 max-w-sm w-full mx-4 z-10"
    (click)="$event.stopPropagation()">
    <button (click)="fecharModal()"
      class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">
      &times;
    </button>
    <div class="text-center">
      <img src="assets/sugestao_presente2.png" alt="Sugestões de presentes" class="w-full rounded-2xl" />
    </div>
  </div>
</div>
