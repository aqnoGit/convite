<div class="min-h-screen p-4 md:p-8" style="background-color: #f7e2dd;">
  <div class="max-w-4xl mx-auto">

    <h1 class="text-2xl md:text-4xl font-bold text-center mb-2" style="color: #f1a8a8;">
      Convidados Confirmados
    </h1>
    <p class="text-center text-sm mb-6" style="color: #f1a8a8;">Lista de presenças confirmadas</p>

    <div class="grid grid-cols-1 gap-2 md:gap-4 mb-6">
      <div class="bg-white rounded-2xl shadow p-3 md:p-4 text-center">
        <p class="text-2xl md:text-3xl font-bold" style="color: #f1a8a8;">{{ convidados.length }}</p>
        <p class="text-xs md:text-sm font-semibold text-gray-500 mt-1">Total</p>
      </div>
    </div>

    <div *ngIf="carregando" class="text-center" style="color: #f1a8a8;">Carregando...</div>

    <div *ngIf="!carregando" class="space-y-3">
      <p *ngIf="grupos.length === 0" class="text-center text-gray-500 bg-white rounded-2xl shadow-lg p-6">
        Nenhum convidado confirmou presença ainda.
      </p>

      <div *ngFor="let grupo of grupos" class="bg-white rounded-2xl shadow-lg p-4 md:p-5">
        <p class="font-bold text-gray-800">{{ grupo.principal.nome }}</p>
        <div *ngIf="grupo.acompanhantes.length > 0" class="mt-2 pl-4 border-l-2" style="border-color: #f1a8a8;">
          <p *ngFor="let a of grupo.acompanhantes" class="text-sm text-gray-600 py-0.5">
            {{ a.nome ?? a.nomeCrianca }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
